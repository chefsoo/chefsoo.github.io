<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>390 Bar Tab — chefsoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --muted: #6b6b66;
      --faint: #e8e6e0;
      --bg: #f5f3ee;
      --white: #ffffff;
      --accent: #b08c5a;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 2rem 2rem;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    header a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    .main {
      max-width: 780px;
      margin: 0 auto;
      padding: 5rem 2rem;
      width: 100%;
      flex: 1;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 5vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 2rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .placeholder-text {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 420px;
    }

    .status-bar {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--faint);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
    }

    .status-text {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    footer {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--faint);
    }

    footer a {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--ink); }

    footer span {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">chefsoo</a>
  </header>

  <main class="main">
    <p class="eyebrow">Complete</p>
    <h1>390<br /><em>Bar Tab.</em></h1>
    <p class="placeholder-text">
      Tracking every drink at one bar. What gets ordered, when, by whom, and
      whether any of it makes sense in aggregate. Notes and data to follow.
    </p>

  </main>

  <footer>
    <a href="index.html">All projects</a>
    <span>chefsoo &mdash; 2026</span>
  </footer>

</body>
</html>
